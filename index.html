<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛕 疏文自動生成系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#7a1010;--red2:#9a1818;
  --gold:#b8841e;--gold2:#d4a832;
  --cream:#fdf6e3;--cream2:#f5ead0;--cream3:#ede0be;
  --ink:#1c1008;
  --border:rgba(184,132,30,.3);
  --r:12px;--r-sm:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:0 16px 60px}

/* 頁首 */
.hd{background:var(--red);padding:22px 28px;border-radius:0 0 var(--r) var(--r);margin-bottom:28px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(122,16,16,.25)}
.hd h1{color:#f5e0a0;font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;letter-spacing:3px}
.hd p{color:rgba(245,224,160,.65);font-size:12px;margin-top:3px;letter-spacing:1px}

/* 步驟 */
.steps{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:24px}
.st{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:30px;font-size:13px;color:#9a7030;transition:all .2s}
.st .n{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--cream3);color:#9a7030;transition:all .2s}
.st.on{color:var(--red)}.st.on .n{background:var(--red);color:#f5e0a0}
.st.done .n{background:#2e7d32;color:#fff}.st.done{color:#2e7d32}
.arr{color:var(--border);font-size:16px}

/* 卡片 */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 12px rgba(28,16,8,.08)}
.card-hd{background:var(--red);padding:13px 20px;display:flex;align-items:center;gap:8px}
.card-hd h2{color:#f5e0a0;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;letter-spacing:2px}
.card-bd{padding:24px 20px}

/* 上傳區 */
.drop{border:2px dashed var(--border);border-radius:var(--r);padding:44px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--cream)}
.drop:hover,.drop.ov{border-color:var(--gold);background:#fdf8ee;transform:translateY(-2px)}
.drop .ico{font-size:40px;display:block;margin-bottom:12px}
.drop h3{font-size:16px;font-weight:500;margin-bottom:8px;color:var(--red)}
.drop p{font-size:13px;color:#8a6830;line-height:1.8}
.drop em{color:var(--gold);font-style:normal;font-weight:500}
.done-bar{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#f0faf0;border-radius:var(--r-sm);border:1px solid #b8e0b0}
.done-bar .re{margin-left:auto;font-size:12px;color:var(--gold);cursor:pointer;text-decoration:underline}

/* 日期欄 */
.date-row{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:10px;background:var(--cream);padding:14px;border-radius:var(--r-sm);margin-bottom:18px}
.df label{font-size:11px;color:#8a6830;display:block;margin-bottom:4px}
.df input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--ink);background:#fff;font-family:'Noto Serif TC',serif}
.df input:focus{outline:none;border-color:var(--gold)}

/* 表格 */
.tbl-wrap{overflow:auto;max-height:280px;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{background:var(--cream2);padding:9px 11px;font-weight:500;font-size:11px;color:#6a4820;border-bottom:1px solid var(--border);position:sticky;top:0;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:8px 11px;border-bottom:1px solid rgba(184,132,30,.1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:var(--cream)}
.tag-ok{background:#e8f5e9;color:#1b5e20;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.tag-no{background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}

/* 按鈕 */
.btn-main{width:100%;padding:14px;background:var(--red);color:#f5e0a0;border:none;border-radius:var(--r-sm);font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;letter-spacing:3px;cursor:pointer;margin-bottom:10px;transition:all .2s}
.btn-main:hover{background:var(--red2);transform:translateY(-1px)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-sec{padding:9px 18px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:var(--r-sm);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.btn-sec:hover{background:rgba(184,132,30,.08)}

/* 結果 */
.stats{display:flex;gap:12px;margin-bottom:18px}
.stat{background:var(--cream);border-radius:var(--r-sm);padding:10px 18px;text-align:center;border:1px solid var(--border)}
.stat .n{font-size:24px;font-weight:700;font-family:'Noto Serif TC',serif}
.stat .l{font-size:11px;color:#8a6830;margin-top:2px}
.stat.ok .n{color:#2e7d32}.stat.err .n{color:#c62828}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;max-height:90px;overflow-y:auto}
.tab{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;color:#6a4820;background:var(--cream);transition:all .15s;white-space:nowrap}
.tab:hover{border-color:var(--gold);color:var(--gold)}
.tab.on{background:var(--red);border-color:var(--red);color:#f5e0a0}

.preview-layout{display:grid;grid-template-columns:200px 1fr;gap:16px}
@media(max-width:600px){.preview-layout{grid-template-columns:1fr}}
.info-panel{background:var(--cream);border-radius:var(--r-sm);padding:14px;border:1px solid var(--border)}
.info-panel h4{font-size:11px;color:#8a6830;letter-spacing:1px;margin-bottom:10px}
.ir{display:flex;gap:6px;margin-bottom:7px;align-items:baseline}
.il{font-size:11px;color:#8a6830;min-width:44px;flex-shrink:0}
.iv{font-size:13px;font-family:'Noto Serif TC',serif;word-break:break-all;line-height:1.5}
.iv input{border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--ink);font-size:13px;width:100%;padding:1px 3px;font-family:'Noto Serif TC',serif}
.iv input:focus{outline:none;border-bottom-color:var(--gold)}

.docview{background:var(--cream);border:1px solid var(--border);border-radius:var(--r-sm);padding:20px;min-height:300px;font-size:13px;line-height:2.2;font-family:'Noto Serif TC',serif;white-space:pre-wrap;word-break:break-all;overflow:auto;max-height:500px;color:var(--ink)}
.docview-empty{display:flex;align-items:center;justify-content:center;height:200px;color:#8a6830;font-size:14px}

.act-bar{display:flex;gap:10px;flex-wrap:wrap;padding:14px 0 0;border-top:1px solid var(--border);margin-top:14px;align-items:center}
.act-bar .pr{margin-left:auto;display:flex;align-items:center;gap:6px}
.act-bar .pr label{font-size:11px;color:#8a6830;white-space:nowrap}
.act-bar .pr input{padding:6px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:#fff;color:var(--ink);font-size:12px;width:130px}

/* 進度 */
.prog-wrap{text-align:center;padding:20px;display:none}
.prog-wrap.show{display:block}
.prog-bar{height:6px;background:var(--cream3);border-radius:3px;overflow:hidden;margin:12px 0}
.prog-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .3s;width:0%}
.prog-txt{font-size:13px;color:#8a6830}

.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <span style="font-size:28px">🛕</span>
    <div>
      <h1>疏文自動生成系統</h1>
      <p>上傳 Excel → 自動辨識 → 生成 Word → 下載列印</p>
    </div>
  </div>

  <div class="steps">
    <div class="st on" id="s1"><span class="n">1</span>上傳資料</div>
    <span class="arr">›</span>
    <div class="st" id="s2"><span class="n">2</span>確認生成</div>
    <span class="arr">›</span>
    <div class="st" id="s3"><span class="n">3</span>預覽下載</div>
  </div>

  <!-- 頁面1：上傳 -->
  <div id="pg1">
    <div class="card">
      <div class="card-hd"><span>📋</span><h2>上傳信眾資料</h2></div>
      <div class="card-bd">
        <div class="drop" id="dz" onclick="document.getElementById('fi').click()">
          <span class="ico">📊</span>
          <h3>拖曳 Excel 到這裡，或點此上傳</h3>
          <p>支援 <em>空白.xlsx</em>、<em>拔薦.xlsx</em><br>系統自動辨識每筆對應的疏文種類</p>
        </div>
        <input type="file" id="fi" accept=".xlsx,.xls" class="hidden" onchange="handleFile(this.files[0])">
        <div id="done-msg" class="hidden" style="margin-top:12px"></div>
      </div>
    </div>
  </div>

  <!-- 頁面2：確認 -->
  <div id="pg2" class="hidden">
    <div class="card">
      <div class="card-hd"><span>📅</span><h2>確認資料與農曆日期</h2></div>
      <div class="card-bd">
        <div class="date-row">
          <div class="df"><label>今年干支</label><input id="d0" placeholder="如：乙巳"></div>
          <div class="df"><label>今月（農曆）</label><input id="d1" placeholder="如：三"></div>
          <div class="df"><label>今日（農曆）</label><input id="d2" placeholder="如：十五"></div>
          <div class="df"><label>備用</label><input id="d3" placeholder="如：初八"></div>
          <div class="df" style="display:flex;align-items:flex-end">
            <button class="btn-sec" onclick="doGenerate()" style="white-space:nowrap">⚡ 生成</button>
          </div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th style="width:28px">#</th>
              <th style="width:70px">姓名</th>
              <th style="width:120px">項目</th>
              <th style="width:120px">辨識結果</th>
              <th style="width:36px">份數</th>
              <th style="width:90px">農曆生日</th>
              <th style="width:44px">時辰</th>
            </tr></thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
        <div class="prog-wrap" id="prog">
          <div class="prog-txt" id="prog-txt">生成中…</div>
          <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
        </div>
        <div class="btn-row">
          <button class="btn-sec" onclick="reset()">← 重新上傳</button>
          <span id="g-hint" style="font-size:12px;color:#8a6830;align-self:center"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- 頁面3：預覽下載 -->
  <div id="pg3" class="hidden">
    <div class="card">
      <div class="card-hd"><span>👁</span><h2>預覽與下載</h2></div>
      <div class="card-bd">
        <div class="stats" id="stats"></div>
        <div class="tabs" id="tabs"></div>
        <div class="preview-layout">
          <div>
            <div class="info-panel">
              <h4>信士資料</h4>
              <div id="ifields"></div>
              <div style="border-top:1px solid var(--border);margin:10px 0;padding-top:10px">
                <h4 style="margin-bottom:8px">修改日期</h4>
                <div class="ir"><span class="il">干支</span><span class="iv"><input id="r0" placeholder="乙巳"></span></div>
                <div class="ir"><span class="il">今月</span><span class="iv"><input id="r1" placeholder="三"></span></div>
                <div class="ir"><span class="il">今日</span><span class="iv"><input id="r2" placeholder="十五"></span></div>
                <button class="btn-sec" style="width:100%;margin-top:8px;font-size:12px" onclick="regen()">↺ 重新生成</button>
              </div>
            </div>
          </div>
          <div>
            <div class="docview" id="docview"><div class="docview-empty">← 選擇上方疏文預覽</div></div>
          </div>
        </div>
        <div class="act-bar">
          <button class="btn-main" style="width:auto;padding:10px 24px;margin:0;font-size:14px" onclick="dlCurrent()">⬇ 下載此份 Word</button>
          <button class="btn-sec" onclick="dlAll()">📦 下載全部 ZIP</button>
          <button class="btn-sec" onclick="reset()">↺ 重新上傳</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
const {Document,Packer,Paragraph,TextRun,AlignmentType} = docx;

let recs=[], results=[], curIdx=0;

const RULES=[
  [['補財','添財'],'消災添財','01'],
  [['補庫','財庫'],'消災補庫','02'],
  [['補運','消災解厄','解厄','消災','添運'],'消災解厄','03'],
  [['夫婦','婚姻'],'姻緣夫婦金','04'],
  [['貴人','木姻','朋友'],'姻緣貴人木','05'],
  [['單身','水姻','未婚','桃花'],'姻緣未婚水','06'],
  [['再婚','火姻'],'姻緣再婚火','07'],
  [['同性'],'姻緣同性緣土','08'],
  [['冤親','解冤','釋結','債主'],'解冤釋結','09'],
  [['財神斗'],'斗燈財神斗','10'],
  [['月老'],'斗燈月老斗','11'],
  [['化煞'],'斗燈化煞斗','12'],
  [['貴人斗'],'斗燈貴人斗','13'],
  [['開運斗'],'斗燈開運斗','14'],
  [['拔薦','超渡','牒文'],'拔薦牒文','15'],
  [['天赦'],'天赦日文疏','16'],
  [['狐仙'],'狐仙文疏','17'],
  [['親貴人','祈安植福'],'親貴人祈安','18'],
  [['遠小人'],'遠小人祈安','19'],
  [['普度'],'祈安普度','20'],
  [['煞星','祭送'],'祭送煞星','21'],
];

function matchItem(item){
  const s=String(item||'');
  for(const [kws,name,code] of RULES)
    for(const kw of kws) if(s.includes(kw)) return {name,code};
  return null;
}
function city(a){const m=String(a||'').match(/^([\u4e00-\u9fff]{2,6}[縣市])/);return m?m[1]:String(a||'').slice(0,5)}
function getCfg(){return{y:v('d0'),m:v('d1'),d:v('d2'),x:v('d3')}}
function v(id){return document.getElementById(id).value.trim()}
function setStep(n){[1,2,3].forEach(i=>{const e=document.getElementById('s'+i);e.classList.remove('on','done');if(i<n)e.classList.add('done');else if(i===n)e.classList.add('on')})}
function showPg(n){[1,2,3].forEach(i=>document.getElementById('pg'+i).classList.toggle('hidden',i!==n));setStep(n)}

// 拖曳
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('ov')});
dz.addEventListener('dragleave',()=>dz.classList.remove('ov'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('ov');handleFile(e.dataTransfer.files[0])});

function handleFile(f){
  if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!rows.length){alert('Excel沒有資料');return}
      const hdr=rows[0];
      const COL={'姓名':'name','公司行號':'company','生日-農曆':'btype','生日-國農曆':'btype',
        '生日-年':'by','生日-月':'bm','生日-日':'bd','時辰':'bh',
        '居住地址':'addr','項目':'item','份數':'shares','祈願':'wish',
        '牒文類別':'tablet','卒于-年':'dy','卒于-月':'dm','卒于-日':'dd',
        '姓':'sur','公/姑娘/媽':'hon','名':'giv','考/妣':'con',
        '陰宅地址':'tomb','先祖名':'anc','正魂數量':'soul'};
      const idx={};
      hdr.forEach((h,i)=>{if(COL[String(h)])idx[COL[String(h)]]=i});
      if(!('wish' in idx)&&hdr.length>11)idx.wish=11;
      recs=[];
      rows.slice(1).forEach(row=>{
        if(!row.some(c=>c!==''))return;
        const ni=idx.name??2;
        if(!row[ni])return;
        const rec={};
        Object.entries(idx).forEach(([f,i])=>rec[f]=String(row[i]??''));
        const m=matchItem(rec.item);
        rec._match=m;rec._ok=!!m;
        if(m)rec.code=m.code;
        recs.push(rec);
      });
      // 顯示上傳成功
      document.getElementById('done-msg').innerHTML=`<div class="done-bar"><span style="font-size:22px">✅</span><div><strong>${f.name}</strong><br><span style="font-size:12px;color:#5a8a5a">成功讀取 ${recs.length} 筆，AI已辨識疏文種類</span></div><span class="re" onclick="reset()">重新上傳</span></div>`;
      document.getElementById('done-msg').classList.remove('hidden');
      renderTable();
      showPg(2);
    }catch(err){alert('讀取失敗：'+err.message)}
  };
  reader.readAsBinaryString(f);
}

function renderTable(){
  document.getElementById('tb').innerHTML=recs.map((r,i)=>`<tr>
    <td style="color:#aa8840;font-size:11px">${i+1}</td>
    <td><strong>${r.name||''}</strong></td>
    <td>${r.item||''}</td>
    <td>${r._ok?`<span class="tag-ok">✓ ${r._match.name}</span>`:'<span class="tag-no">未辨識</span>'}</td>
    <td style="text-align:center">${r.shares||1}</td>
    <td>${[r.by,r.bm,r.bd].filter(Boolean).join('/')}</td>
    <td>${r.bh||''}</td>
  </tr>`).join('');
}

function buildContent(rec, cfg){
  const n=rec.name||'',addr=rec.addr||'',wish=rec.wish||'';
  const by=rec.by||'',bm=rec.bm||'',bd=rec.bd||'',bh=rec.bh||'';
  const ss=String(rec.shares||1);
  const co=rec.code||'';
  const anc=rec.anc||'',sur=rec.sur||'',hon=rec.hon||'',giv=rec.giv||'';
  const anc_full=sur?`${sur}氏${hon}${giv}`:anc;
  const dy=rec.dy||'',dm_=rec.dm||'',dd_=rec.dd||'';
  const death=dy?`${dy}年${dm_}月${dd_}日`:'';
  const c=city(addr);

  const T={
    '01':[`內 ${ss} 件`,`添財賜福文疏　靈寶大法司 本司為添財賜福祈安植福事`,`天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 良時`,``,`大中華民國：${c}`,`道宣經立疏添財賜福祈安植福：`,`植福信士(女)：${n}　農曆 ${by} 年 ${bm} 月 ${bd} 日 ${bh} 時生`,``,wish||addr,``,`　　聖造光中具呈意者，伏念右具信等，生居塵世之中，忝植人倫之內，各善居住，生意謀營，但恐今日之前，年犯諸多凶星，惡曜臨身，致使當生，財源不聚，財運不順，事業不振，多生災厄，等多愆尤，因無可解之方，幸有祈禱之路，涓今吉旦，恭對案前，立疏 ${ss} 封，仰仗直日功曹使者為民轉奏。`,``,`　　台中靈應壇 天官武財神爺 合廟列位一切文武眾神祇座前呈奏，並虔備庫財銀錢 ${ss} 封投寄天曹掌財祿司案上交納。茲為右民信等解消今日之前眾災諸厄，得以元辰光彩，大命堅固，平安順利，事業發展，利路亨通，行往五方十路，貴人來扶助，求財得財，求利得利，財庫滿盈，富貴綿長，平安吉慶，永貞吉祥。`,``,`天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 良時`],

    '20':[`靈寶大法司 為賑濟孤魂幽靈事　右牒付`,`祈安普度牒文　呈進天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 吉時`,``,`大中華民國：${addr}`,`道宣經禮懺太上正一慶讚中元普施賑濟道場祈安植福信士：${n}`,``,wish||addr,``,`　　暨合境眾信人等虔心誠意，謹涓本月日仗道抵境，崇建太上正一慶讚中元普施賑濟道場大法會，普施法筵，恭祈景貺，據此宣功，理宜普度。痛念本境界內一切男女有靈無祀有祀無靈無主無依孤魂幽靈滯魄等眾，久墜幽陰，未經薦拔，幸遇眾信人等虔心誠意，普施諸靈，超生淨土，永享安樂。`,``,`天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 良時`],
    '21':[`仰仗 直日功曹使者 為民傳奏　內 ${ss} 件`,`祭送煞星文疏　靈寶大法司 為祭送煞星祈安植福事`,`天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 良時`,``,`大中華民國：${addr}`,`${n}　農曆 ${by} 年 ${bm} 月 ${bd} 日 ${bh} 時生`,``,wish||addr,``,`　　聖造光中具呈意者，言念信士(女)：${n} 人等，恐有今季以來，星辰不順，災病相侵，運限多端，諸般等煞入命作災，謹涓吉日良時，恭請台中靈應壇 天官武財神爺 合廟列位一切文武眾神祇，祭送煞星出境，移凶化吉，消災解厄，平安順利，永貞吉祥。`,``,`天運歲次 ${cfg.y} 年 ${cfg.m} 月 ${cfg.d} 日 良時`],
  };
  return (T[co]||[`【${rec.item||''}】`,``,`${n}　農曆 ${by} 年 ${bm} 月 ${bd} 日 ${bh} 時生`,`地址：${addr}`,``,wish]).join('\n');
}

async function makeDocx(rec, cfg){
  const lines=buildContent(rec,cfg).split('\n');
  const doc=new Document({
    sections:[{
      properties:{page:{size:{width:12240,height:17640},margin:{top:1440,right:1080,bottom:1440,left:1080}}},
      children:lines.map(line=>new Paragraph({
        children:[new TextRun({text:line,font:'標楷體',size:28})],
        spacing:{line:480}
      }))
    }]
  });
  return await Packer.toBlob(doc);
}

async function doGenerate(){
  const cfg=getCfg();
  const prog=document.getElementById('prog');
  const fill=document.getElementById('prog-fill');
  const btn=document.querySelector('.btn-sec[onclick="doGenerate()"]');
  prog.classList.add('show');
  if(btn)btn.disabled=true;
  results=[];
  for(let i=0;i<recs.length;i++){
    const r=recs[i];
    fill.style.width=Math.round((i/recs.length)*100)+'%';
    document.getElementById('prog-txt').textContent=`生成中 ${i+1}/${recs.length}：${r.name} ${r.item}`;
    if(r._ok){
      try{
        const blob=await makeDocx(r,cfg);
        const text=buildContent(r,cfg);
        results.push({...r,_blob:blob,_text:text,_cfg:{...cfg}});
      }catch(e){
        results.push({...r,_blob:null,_text:'生成失敗：'+e.message,_cfg:{...cfg}});
      }
    }else{
      results.push({...r,_blob:null,_text:'未找到對應模板',_cfg:{...cfg}});
    }
    await new Promise(r=>setTimeout(r,10));
  }
  fill.style.width='100%';
  prog.classList.remove('show');
  if(btn)btn.disabled=false;
  document.getElementById('g-hint').textContent=`✅ 已生成 ${results.filter(r=>r._ok&&r._blob).length} 份 Word`;
  renderResults();
  showPg(3);
}

function renderResults(){
  const ok=results.filter(r=>r._ok&&r._blob).length,bad=results.length-ok;
  document.getElementById('stats').innerHTML=
    `<div class="stat ok"><div class="n">${ok}</div><div class="l">成功</div></div>`+
    (bad?`<div class="stat err"><div class="n">${bad}</div><div class="l">失敗</div></div>`:'')+
    `<div class="stat"><div class="n">${results.length}</div><div class="l">總計</div></div>`;
  const ok_r=results.filter(r=>r._ok&&r._blob);
  document.getElementById('tabs').innerHTML=ok_r.map((r,i)=>
    `<div class="tab${i===0?' on':''}" onclick="selDoc(${i},this)">${r.name}・${r.item}</div>`
  ).join('');
  if(ok_r.length)selDocData(0);
  document.getElementById('r0').value=document.getElementById('d0').value;
  document.getElementById('r1').value=document.getElementById('d1').value;
  document.getElementById('r2').value=document.getElementById('d2').value;
}

function selDoc(idx,el){
  curIdx=idx;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  selDocData(idx);
}
function selDocData(idx){
  curIdx=idx;
  const ok_r=results.filter(r=>r._ok&&r._blob);
  if(idx>=ok_r.length)return;
  const r=ok_r[idx];
  const flds=[['姓名',r.name],['地址',r.addr],['農曆生日',[r.by,r.bm,r.bd].filter(Boolean).join('/')],['時辰',r.bh],['份數',r.shares||1],['祈願',r.wish]].filter(([,val])=>val);
  document.getElementById('ifields').innerHTML=flds.map(([l,val])=>`<div class="ir"><span class="il">${l}</span><span class="iv">${val}</span></div>`).join('');
  document.getElementById('docview').textContent=r._text||'';
}

async function regen(){
  const cfg={y:v('r0')||v('d0'),m:v('r1')||v('d1'),d:v('r2')||v('d2'),x:v('d3')};
  document.getElementById('d0').value=cfg.y;
  document.getElementById('d1').value=cfg.m;
  document.getElementById('d2').value=cfg.d;
  const prog=document.getElementById('prog');
  prog.classList.add('show');
  results=[];
  for(let i=0;i<recs.length;i++){
    const r=recs[i];
    if(r._ok){
      try{
        const blob=await makeDocx(r,cfg);
        results.push({...r,_blob:blob,_text:buildContent(r,cfg),_cfg:{...cfg}});
      }catch(e){results.push({...r,_blob:null,_text:'失敗：'+e.message})}
    }else results.push({...r,_blob:null});
    await new Promise(r=>setTimeout(r,5));
  }
  prog.classList.remove('show');
  renderResults();
}

function dlCurrent(){
  const ok_r=results.filter(r=>r._ok&&r._blob);
  if(!ok_r.length)return;
  const r=ok_r[curIdx]||ok_r[0];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(r._blob);
  a.download=`${r.name}_${r.item}.docx`;
  a.click();
}

async function dlAll(){
  const ok_r=results.filter(r=>r._ok&&r._blob);
  if(!ok_r.length)return;
  // 逐一下載
  for(const r of ok_r){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(r._blob);
    a.download=`${r.name}_${r.item}.docx`;
    a.click();
    await new Promise(res=>setTimeout(res,300));
  }
}

function reset(){
  recs=[];results=[];curIdx=0;
  document.getElementById('fi').value='';
  document.getElementById('done-msg').classList.add('hidden');
  document.getElementById('tb').innerHTML='';
  document.getElementById('g-hint').textContent='';
  document.getElementById('prog').classList.remove('show');
  showPg(1);
}
</script>
